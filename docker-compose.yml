version: "3.9"

services:
  nginx:
    image: nginx:alpine
    container_name: vibe_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:17
    container_name: vibe_postgres
    environment:
      POSTGRES_USER: vibe_user
      POSTGRES_PASSWORD: vibe_password
      POSTGRES_DB: vibe_coding
    ports:
      - "127.0.0.1:5432:5432" # Bound to localhost only for security
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibe_user -d vibe_coding"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Redis removed — cache, queue, and rate limiting are now SQLite-backed.
  # No external caching dependency is required.

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vibe_backend
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - sqlite_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vibe_frontend
    env_file:
      - ./frontend/.env.local
    environment:
      # Tell frontend to use relative paths for API, letting Nginx handle proxying
      - NEXT_PUBLIC_API_URL=
    depends_on:
      - backend
    restart: unless-stopped

  service:
    build:
      context: ./service
      dockerfile: Dockerfile
    container_name: vibe_hermes
    env_file:
      - .env
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  sqlite_data:
